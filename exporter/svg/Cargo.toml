[package]
name = "typst-ts-svg-exporter"
description = "Export a frame of Typst document into svg element."
version.workspace = true
license.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]

typst.workspace = true
comemo.workspace = true

tiny-skia.workspace = true
ttf-parser.workspace = true
flate2.workspace = true
once_cell.workspace = true
base64.workspace = true
siphasher.workspace = true
xmlparser = "0.13.5"
rkyv = { version = "0.7.42", optional = true, features = [
    "validation",
    "alloc",
] }

typst-ts-core.workspace = true

wasm-bindgen = { workspace = true, optional = true }
js-sys = { workspace = true, optional = true }
web-sys = { workspace = true, features = [
    "console",
    "CanvasRenderingContext2d",
    "Path2d",
    "Blob",
    "ImageData",
    "HtmlImageElement",
    "HtmlElement",
    "Url",
    "BlobPropertyBag",
    "DomParser",
    "SupportedType",
    "HtmlCollection",
], optional = true }
async-trait = "0.1.68"

[features]
rkyv = ["dep:rkyv"]
rkyv-validation = ["dep:rkyv"]
flat-vector = ["rkyv", "rkyv-validation"]
canvas = ["flat-vector", "dep:wasm-bindgen", "dep:js-sys", "dep:web-sys"]
default = ["flat-vector"]
